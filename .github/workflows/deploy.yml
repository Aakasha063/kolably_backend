name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create project archive
        run: |
          mkdir -p build_output
          tar --exclude=./build_output -czf build_output/kolably_backend.tar.gz .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy archive to EC2
        run: scp -i ~/.ssh/key.pem build_output/kolably_backend.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~

      - name: Deploy on EC2 via SSH
        run: |
          ssh -i ~/.ssh/key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Decompress and setup
            rm -rf kolably_backend_v2
            mkdir -p kolably_backend_v2
            tar -xzf kolably_backend.tar.gz -C kolably_backend_v2
            cd kolably_backend_v2
            
            # Copy existing .env if present in parent dir or use default
            if [ -f ../kolably_backend/.env ]; then
              cp ../kolably_backend/.env .env
            fi
            
            # Build and Deploy
            sudo docker build -t kolably-backend-cicd .
            sudo docker rm -f kolably-backend-prod || true
            sudo docker run -d --name kolably-backend-prod -p 80:8000 --env-file .env kolably-backend-cicd
            
            # Cleanup
            cd ..
            rm -rf kolably_backend
            mv kolably_backend_v2 kolably_backend
            rm kolably_backend.tar.gz
          EOF
