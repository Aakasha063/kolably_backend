name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create project archive
        run: |
          mkdir -p build_output
          tar --exclude=./build_output -czf build_output/kolably_backend.tar.gz .

      - name: Debug Secrets (Check Lengths)
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "HOST is MISSING"; else echo "HOST length: ${#EC2_HOST}"; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "USER is MISSING"; else echo "USER length: ${#EC2_USER}"; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "KEY is MISSING"; else echo "KEY length: ${#EC2_SSH_KEY}" ; fi
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Transfer archive to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "build_output/kolably_backend.tar.gz"
          target: "~/"
          strip_components: 1

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Decompress and setup
            rm -rf kolably_backend_v2
            mkdir -p kolably_backend_v2
            tar -xzf kolably_backend.tar.gz -C kolably_backend_v2
            cd kolably_backend_v2
            
            # Copy existing .env if present in parent dir or use default
            if [ -f ../kolably_backend/.env ]; then
              cp ../kolably_backend/.env .env
            fi
            
            # Build and Deploy
            sudo docker build -t kolably-backend-cicd .
            sudo docker rm -f kolably-backend-prod || true
            sudo docker run -d --name kolably-backend-prod -p 8001:8000 --env-file .env kolably-backend-cicd
            
            # Reload Nginx to ensure it points to the new container
            sudo systemctl reload nginx
            
            # Cleanup
            cd ..
            rm -rf kolably_backend
            mv kolably_backend_v2 kolably_backend
            rm kolably_backend.tar.gz
